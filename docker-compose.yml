version: '3.8'

services:
  web:
    build: .
    ports:
      - "80:80"
    environment:
      - DB_HOST=db
      - DB_USER=pantry_user
      - DB_PASSWORD=pantry_secure_password
      - DB_NAME=pantry_db
    depends_on:
      - db

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=pantry_db
      - MYSQL_USER=pantry_user
      - MYSQL_PASSWORD=pantry_secure_password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
