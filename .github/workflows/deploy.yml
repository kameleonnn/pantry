name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_REGISTRY_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and Push Web Image
        run: |
          docker build -t ${{ secrets.AZURE_REGISTRY_SERVER }}/pantry-web:latest .
          docker push ${{ secrets.AZURE_REGISTRY_SERVER }}/pantry-web:latest
          docker build -t ${{ secrets.AZURE_REGISTRY_SERVER }}/pantry-web:${{ github.run_number }} .
          docker push ${{ secrets.AZURE_REGISTRY_SERVER }}/pantry-web:${{ github.run_number }}
